type: Dashboard
title: Publications
description: >-
  Every month, more than 20,000 papers are published in PubMed. Many of these papers report data and results that can be used to construct and properly use the HRA. Statistics and visualizations about the size, coverage, and composition of the HRA Literature (HRAlit) dataset are featured here. There are 8,780,250 publications, 8,706,593 authors, 894,4691 affiliations, for a total of 70,921,395 nodes with 352,767,933 edges.
